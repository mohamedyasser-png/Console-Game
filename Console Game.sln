// ============ DIFFERENT ENEMY TYPES ============
void DrawEnemy(int r, int c, int type)
{
    if (type == 0)
    {

        wrld[r][c] = '.';
        wrld[r][c + 1] = '-';
        wrld[r][c + 2] = '.';

        wrld[r + 1][c] = '(';
        wrld[r + 1][c + 1] = '0';
        wrld[r + 1][c + 2] = ')';

        wrld[r + 2][c] = '/';
        wrld[r + 2][c + 1] = '|';
        wrld[r + 2][c + 2] = '\\';

        wrld[r + 3][c] = '/';
        wrld[r + 3][c + 2] = '\\';
    }
    else if (type == 1)
    {

        wrld[r][c] = '[';
        wrld[r][c + 1] = '^';
        wrld[r][c + 2] = ']';

        wrld[r + 1][c] = '|';
        wrld[r + 1][c + 1] = 'o';
        wrld[r + 1][c + 2] = '|';

        wrld[r + 2][c] = '/';
        wrld[r + 2][c + 2] = '\\';
    }
    else if (type == 2)
    {

        wrld[r][c] = '<';
        wrld[r][c + 1] = '=';
        wrld[r][c + 2] = '>';

        wrld[r + 1][c] = '|';
        wrld[r + 1][c + 1] = 'X';
        wrld[r + 1][c + 2] = '|';
    }
}

// ============ BOSS ============
void DrawBoss()
{
    if (currentLevel == 2 && bossA == 1)
    {
        if (bossR >= 0 && bossC + 7 < 200)
        {
            wrld[bossR][bossC + 3] = '.';
            wrld[bossR][bossC + 4] = '\'';
            wrld[bossR][bossC + 5] = '.';
            wrld[bossR][bossC + 6] = '\'';
        }

        if (bossR + 1 >= 0 && bossC + 6 < 200)
        {
            wrld[bossR + 1][bossC + 2] = '.';
            wrld[bossR + 1][bossC + 3] = '\'';
            wrld[bossR + 1][bossC + 4] = '-';
            wrld[bossR + 1][bossC + 5] = '\'';
            wrld[bossR + 1][bossC + 6] = '.';
        }

        if (bossR + 2 >= 0 && bossC + 8 < 200)
        {
            wrld[bossR + 2][bossC] = '.';
            wrld[bossR + 2][bossC + 3] = '(';
            if (frame % 30 < 10)
            {
                wrld[bossR + 2][bossC + 5] = 'X';
                wrld[bossR + 2][bossC + 7] = 'X';
            }
            else if (frame % 30 < 20)
            {
                wrld[bossR + 2][bossC + 5] = 'O';
                wrld[bossR + 2][bossC + 7] = 'O';
            }
            else
            {
                wrld[bossR + 2][bossC + 5] = '-';
                wrld[bossR + 2][bossC + 7] = '-';
            }
            wrld[bossR + 2][bossC + 8] = ')';
        }

        if (bossR + 3 >= 0 && bossC + 9 < 200)
        {
            wrld[bossR + 3][bossC + 2] = '\\';
            wrld[bossR + 3][bossC + 3] = '_';
            wrld[bossR + 3][bossC + 5] = '`';
            wrld[bossR + 3][bossC + 8] = ',';
        }

        if (bossR + 4 >= 0 && bossC + 9 < 200)
        {
            wrld[bossR + 4][bossC] = '-';
            wrld[bossR + 4][bossC + 1] = '.';
            wrld[bossR + 4][bossC + 2] = '_';
            wrld[bossR + 4][bossC + 3] = '_';
            wrld[bossR + 4][bossC + 4] = '_';
            wrld[bossR + 4][bossC + 5] = '\'';
            wrld[bossR + 4][bossC + 6] = '.';
            wrld[bossR + 4][bossC + 7] = ')';
        }

        if (bossR + 5 >= 0 && bossC + 12 < 200)
        {
            wrld[bossR + 5][bossC + 4] = '\'';
            wrld[bossR + 5][bossC + 5] = '-';
            wrld[bossR + 5][bossC + 6] = '.';

        }

        if (bossR + 6 >= 0 && bossC + 14 < 200)
        {
            wrld[bossR + 6][bossC + 1] = '.';
            wrld[bossR + 6][bossC + 2] = '/';
            wrld[bossR + 6][bossC + 3] = '\\';
            wrld[bossR + 6][bossC + 4] = '/';
            wrld[bossR + 6][bossC + 5] = '\\';
            wrld[bossR + 6][bossC + 6] = '/';
        }
    }
}


