}

void MoveLaserTraps()
{
    for (int i = 0; i < 5; i++)
    {
        if (laserA[i] == 1)
        {
            laserC[i] += (1 * laserDir[i]);

            if (laserC[i] >= 35 || laserC[i] <= 5)
            {
                laserA[i] = 0;
            }
            else
            {
                wrld[laserR[i]][laserC[i]] = '~';


                if (laserR[i] >= rH && laserR[i] <= rH + 3 &&
                    laserC[i] >= cH && laserC[i] <= cH + 3)
                {
                    heroHealth--;
                    laserA[i] = 0;
                }
            }
        }
    }
}

