// ============ MOVEMENT CHECKS ============
int CanMoveDown()
{
    if (rH + 4 >= 29) { return 0; }

    for (int c = cH; c <= cH + 3; c++)
    {
        char x = wrld[rH + 4][c];
        if (x == '#' || x == '*' || x == '=')
        {
            return 0;
        }
        if ((x == '|' || x == '-') && onLadderMode == 0)
        {
            return 0;
        }
    }
    return 1;
}
int CanMoveUp()
{
    if (rH <= 1) { return 0; }

    for (int c = cH; c <= cH + 3; c++)
    {
        char x = wrld[rH - 1][c];
        if (x == '#' || x == '*')
        {
            return 0;
        }
    }
    return 1;
}
int CanMoveRight()
{
    if (cH + 4 >= 199) { return 0; }

    for (int r = rH; r <= rH + 3; r++)
    {
        char x = wrld[r][cH + 4];
        if (x == '#' || x == '*' || x == '[')
        {
            return 0;
        }
    }
    return 1;
}

int CanMoveLeft()
{
    if (cH - 1 <= 0) { return 0; }

    for (int r = rH; r <= rH + 3; r++)
    {
        char x = wrld[r][cH - 1];
        if (x == '#' || x == '*' || x == '[')
        {
            return 0;
        }
    }
    return 1;
}
int OnLadder()
{
    char x = wrld[rH + 2][cH + 1];
    if (x == '|' || x == '-')
    {
        return 1;
    }
    return 0;
}

int OnElevator1()
{
    if (currentLevel == 1)
    {
        if (rH + 4 == elevator1R && cH >= elevator1C && cH <= elevator1C + elevator1Len)
        {
            return 1;
        }
    }
    return 0;
}


void CheckEnemyCollision()
{
    for (int i = 0; i < 4; i++)
    {
        if (eA[i] == 1)
        {
            if (rH >= eR[i] && rH <= eR[i] + 3 &&
                cH >= eC[i] && cH <= eC[i] + 2)
            {
                heroHealth = 0;
            }
        }
    }
}

// ============ BULLETS ============
void Fire()
{
    for (int i = 0; i < 5; i++)
    {
        if (bA[i] == 0)
        {
            bA[i] = 1;
            bR[i] = rH + 1;
            bC[i] = cH + 4;
            bDir[i] = lastDir;
            bType[i] = 0;
            break;
        }
    }
}

void FireLaser()
{
    for (int i = 0; i < 5; i++)
    {
        if (bA[i] == 0)
        {
            bA[i] = 1;
            bR[i] = rH + 1;
            bC[i] = cH + 4;
            bDir[i] = lastDir;
            bType[i] = 1;
            break;
        }
    }
}

void MoveBullets()
{
    for (int i = 0; i < 5; i++)
    {
        if (bA[i] == 1)
        {
            if (bType[i] == 0)
            {
                bC[i] += (2 * bDir[i]);
            }
            else if (bType[i] == 1)
            {
                bC[i] += (4 * bDir[i]);
            }

            if (bC[i] >= 199 || bC[i] <= 1)
            {
                bA[i] = 0;
            }
            else if (wrld[bR[i]][bC[i]] == '#' || wrld[bR[i]][bC[i]] == '*' || wrld[bR[i]][bC[i]] == '[')
            {
                bA[i] = 0;
            }

            if (bA[i] == 1)
            {
                if (bType[i] == 0)
                {
                    wrld[bR[i]][bC[i]] = 'v';
                }
                else if (bType[i] == 1)
                {
                    wrld[bR[i]][bC[i]] = '=';
                }

                for (int j = 0; j < 4; j++)
                {
                    if (eA[j] == 1)
                    {
                        if (bR[i] >= eR[j] && bR[i] <= eR[j] + 3 &&
                            bC[i] >= eC[j] && bC[i] <= eC[j] + 2)
                        {
                            eA[j] = 0;
                            bA[i] = 0;
                        }
                    }
                }

                if (currentLevel == 2 && bossA == 1)
                {
                    if (bR[i] >= bossR && bR[i] <= bossR + 6 &&
                        bC[i] >= bossC && bC[i] <= bossC + 15)
                    {
                        bossHealth--;
                        bA[i] = 0;

                        if (bossHealth <= 0)
                        {
                            bossA = 0;
                        }
                    }
                }
            }
        }
    }
}

// ============ ENEMY BULLETS ============
void EnemyFire(int pos)
{
    for (int i = 0; i < 5; i++)
    {
        if (ebA[i] == 0)
        {
            ebA[i] = 1;
            ebR[i] = eR[pos] + 1;
            ebC[i] = eC[pos] + 1;
            ebDir[i] = -1;
            break;
        }
    }
}

void BossFire()
{
    if (currentLevel == 2 && bossA == 1)
    {
        for (int i = 0; i < 5; i++)
        {
            if (ebA[i] == 0)
            {
                ebA[i] = 1;
                ebR[i] = bossR + 4;
                ebC[i] = bossC + 7;
                ebDir[i] = -1;
                break;
            }
        }
    }
}
void MoveEnemyBullets()
{
    for (int i = 0; i < 5; i++)
    {
        if (ebA[i] == 1)
        {

            ebC[i] += (2 * ebDir[i]);


            if (i % 3 == 0)
            {
                ebR[i]++;
            }
            else if (i % 3 == 1)
            {
                ebR[i]--;
            }



            if (ebC[i] <= 1 || ebC[i] >= 198 ||
                ebR[i] <= 1 || ebR[i] >= 28)
            {
                ebA[i] = 0;
            }
            else
            {

                if (i % 3 == 0)
                {
                    wrld[ebR[i]][ebC[i]] = '*';
                }
                else if (i % 3 == 1)
                {
                    wrld[ebR[i]][ebC[i]] = 'o';
                }
                else
                {
                    wrld[ebR[i]][ebC[i]] = '@';
                }


                if (ebR[i] >= rH && ebR[i] <= rH + 3 &&
                    ebC[i] >= cH && ebC[i] <= cH + 3)
                {
                    heroHealth--;
                    ebA[i] = 0;
                }
            }
        }
    }
}
// ============ ENEMY MOVEMENT ============
void MoveEnemy()
{
    for (int i = 0; i < 4; i++)
    {
        if (eA[i] == 1)
        {
            if (eType[i] == 0)
            {

                int m = eC[i] + eDir[i];

                if (m <= 1 || m >= 196)
                {
                    eDir[i] *= -1;
                }
                else if (wrld[eR[i] + 4][m + 1] != '#')
                {
                    eDir[i] *= -1;
                }
                else
                {
                    eC[i] = m;
                }
            }
            else if (eType[i] == 1)
            {

                eC[i] += eDir[i];

                if (eC[i] <= 1 || eC[i] >= 196)
                {
                    eDir[i] *= -1;
                }
            }
            else if (eType[i] == 2)
            {

                if (frame % 35 == 0)
                {
                    EnemyFire(i);
                }
            }

            DrawEnemy(eR[i], eC[i], eType[i]);
            frame++;

            if (frame % 40 == 0 && eType[i] == 0)
            {
                for (int j = 0; j < 4; j++)
                {
                    if (eA[j] == 1 && eType[j] == 0)
                    {
                        EnemyFire(j);
                        break;
                    }
                }
            }
        }
    }
}

// ============ BOSS MOVEMENT ============
void MoveBoss()
{
    if (currentLevel == 2 && bossA == 1)
    {
        if (bossC < cH - 5)
        {
            bossC++;
        }
        else if (bossC > cH + 5)
        {
            bossC--;
        }

        DrawBoss();
        frame++;

        if (frame % 25 == 0)
        {
            BossFire();
        }
    }
}


void InitLevel1()
{
    rH = 24;
    cH = 5;
    jumpCount = 0;
    jumpDir = 0;
    heroHealth = 5;
    doorC = 180;
    doorR = 12;


    eType[0] = 0;
    eType[1] = 1;
    eType[2] = 0;
    eType[3] = 0;

    for (int i = 0; i < 4; i++)
    {
        eA[i] = (i < 3) ? 1 : 0;
    }

    for (int i = 0; i < 5; i++)
    {
        bA[i] = 0;
        ebA[i] = 0;
        laserA[i] = 0;

    }
    cloudc[0] = 10;
    cloudc[1] = 60;
    cloudc[2] = 105;
    clouddir[0] = 1;
    clouddir[1] = -1;
    clouddir[2] = 1;
}

void InitLevel2()
{
    rH = 24;
    cH = 5;
    jumpCount = 0;
    jumpDir = 0;
    doorC = 5;
    doorR = 10;
    bossA = 1;
    bossHealth = 5;
    bossC = 170;
    bossR = 5;


    for (int i = 0; i < 4; i++)
    {
        eA[i] = 0;
    }

    for (int i = 0; i < 5; i++)
    {
        bA[i] = 0;
        ebA[i] = 0;
        laserA[i] = 0;
    }
}

// ============ MAIN ============
void main()
{
    char key;
    int gameRunning = 1;

    for (int i = 0; i < 5; i++)
    {
        bA[i] = 0;
        bC[i] = 0;
        bR[i] = 0;
        bDir[i] = 0;
        bType[i] = 0;
        ebA[i] = 0;
        ebC[i] = 0;
        ebR[i] = 0;
        ebDir[i] = 0;
        laserA[i] = 0;
        laserC[i] = 0;
        laserR[i] = 0;
        laserDir[i] = 0;
    }

    InitLevel1();

    for (int i = 0; gameRunning == 1; i++)
    {
        World();
        DrawBorder();

        if (currentLevel == 1)
        {
            DrawPlatformsLevel1();
            DrawLaddersLevel1();
            MoveEnemy();
            DrawElevator1();
            MoveElevator1();

        }
        else if (currentLevel == 2)
        {
            DrawRoom1();
            DrawRoom2();


            MoveBoss();
            FireLaserTrap();
            MoveLaserTraps();
        }

        MoveBullets();
        MoveEnemyBullets();
        DrawDoor();
        DrawHero();
        drawclouds();
        moveclouds();
        CheckEnemyCollision();
        if (OnLadder() == 0)
        {
            onLadderMode = 0;
        }
        output();
        if (jumpCount == 0 && OnElevator() == 0 && OnElevator1() == 0 && onLadderMode == 0 && CanMoveDown())
        {
            rH++;
        }
        else if (jumpCount == 0 && !CanMoveDown())
        {
            canJump = 1;
        }

        if (OnElevator1() == 1)
        {
            rH += elevator1Dir;
        }

        if (jumpCount > 0)
        {
            if (CanMoveUp())
            {
                rH--;

                if (jumpDir == 1 && cH < 195 && CanMoveRight())
                {
                    cH++;
                }

                if (jumpDir == -1 && cH > 1 && CanMoveLeft())
                {
                    cH--;
                }

                jumpCount--;
            }
            else
            {
                jumpCount = 0;
            }
        }

        camStart = cH - 40;
        camEnd = camStart + 120;
        if (camStart < 0) { camStart = 0; }
        if (camEnd > 200) { camEnd = 200; }

        Sleep(60);

        moving = 0;
        if (_kbhit())
        {
            key = _getch();
            if (key == 'a' && cH > 1 && CanMoveLeft())
            {
                cH--;
                lastDir = -1;
                moving = 1;
            }

            if (key == 'd' && cH < 195 && CanMoveRight())
            {
                cH++;
                lastDir = 1;
                moving = 1;
            }

            if (key == 'w')
            {
                char x = wrld[rH + 2][cH + 1];
                if ((x == '|' || x == '-') && CanMoveUp())
                {
                    onLadderMode = 1;
                    rH--;
                }
            }
            if (key == 's')
            {
                char x = wrld[rH + 2][cH + 1];
                if (x == '|' || x == '-')
                {
                    onLadderMode = 1;
                    rH++;
                }
            }

            if (key == 'e' && canJump == 1 && OnLadder() == 0 && OnElevator() == 0 && OnElevator1() == 0)
            {
                jumpCount = 6;
                jumpDir = 1;
                canJump = 0;
            }
            if (key == 'q' && jumpCount == 0 && OnLadder() == 0 && OnElevator() == 0)
            {
                jumpCount = 6;
                jumpDir = -1;
            }

            if (key == 'f')
            {
                Fire();
            }

            if (key == 'l')
            {
                FireLaser();
            }

            if (key == 'x')
            {
                gameRunning = 0;
            }
        }

        if (rH >= doorR && rH <= doorR + 2 && cH >= doorC - 2 && cH <= doorC + 2)
        {
            if (currentLevel == 1)
            {
                currentLevel = 2;
                InitLevel2();
            }
            else if (currentLevel == 2)
            {
                if (bossA == 0)
                {
                    system("cls");
                    cout << "========================================\n";
                    cout << "        YOU WIN! BOSS DEFEATED!\n";
                    cout << "========================================\n";
                    gameRunning = 0;
                }
            }
        }

        if (heroHealth <= 0)
        {
            system("cls");
            cout << "========================================\n";
            cout << "     GAME OVER - DEFEATED!\n";
            cout << "========================================\n";
            gameRunning = 0;
        }
    }
}
